<svg xmlns="http://www.w3.org/2000/svg" width="900" height="14" viewBox="0 0 900 14" fill="none">
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse" spreadMethod="repeat">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="20%" stop-color="#a78bfa"/>
      <stop offset="40%" stop-color="#f472b6"/>
      <stop offset="60%" stop-color="#fbbf24"/>
      <stop offset="80%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
      <animate attributeName="x1" values="0;300" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="300;600" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="8%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="92%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <mask id="m">
      <rect width="900" height="14" fill="url(#fade)"/>
    </mask>
  </defs>
  <line x1="0" y1="7" x2="900" y2="7" stroke="url(#bar)" stroke-width="2" stroke-linecap="round" mask="url(#m)"/>
</svg>
