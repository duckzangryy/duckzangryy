<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="4" viewBox="0 0 1200 4" preserveAspectRatio="none">
  <defs>
    <linearGradient id="flow" x1="0" y1="0" x2="360" y2="0" gradientUnits="userSpaceOnUse" spreadMethod="repeat">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="20%" stop-color="#818cf8"/>
      <stop offset="40%" stop-color="#e879f9"/>
      <stop offset="60%" stop-color="#fbbf24"/>
      <stop offset="80%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
      <animate attributeName="x1" values="0;360" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="360;720" dur="2.8s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="4" fill="url(#flow)"/>
  <rect x="0" y="0" width="70" height="4" fill="#ffffff" opacity="0.35">
    <animate attributeName="x" values="-70;1200" dur="2.4s" repeatCount="indefinite"/>
  </rect>
</svg>
