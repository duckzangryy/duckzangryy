<svg xmlns="http://www.w3.org/2000/svg" width="400" height="460" viewBox="0 0 400 460" role="img" aria-label="angry-cute duck mascot in snow">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="beak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="460" fill="transparent"/>
  <circle cx="200" cy="210" r="165" fill="url(#glow)"/>

  <!-- TOP: big stars -->
  <g>
    <path d="M55 40 L62 58 L82 58 L66 70 L72 90 L55 78 L38 90 L44 70 L28 58 L48 58 Z" fill="#fef08a" opacity="0.95">
      <animate attributeName="opacity" values="0.55;1;0.55" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M330 28 L335 42 L350 42 L338 52 L343 66 L330 57 L317 66 L322 52 L310 42 L325 42 Z" fill="#fde68a">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    <path d="M195 18 L199 30 L212 30 L201 38 L205 50 L195 42 L185 50 L189 38 L178 30 L191 30 Z" fill="#fef9c3">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" begin="1s" repeatCount="indefinite"/>
    </path>
    <circle cx="100" cy="70" r="4" fill="#a5f3fc">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="55" r="3.5" fill="#f0abfc">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.9s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="360" cy="80" r="3" fill="#67e8f9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.1s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- TOP sides: code badges (large, opaque) -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="800">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -6; 0 0" dur="3s" repeatCount="indefinite"/>
      <rect x="12" y="100" width="56" height="36" rx="8" fill="#0f172a" stroke="#67e8f9" stroke-width="2.5"/>
      <text x="24" y="125" font-size="20" fill="#67e8f9">{}</text>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -5; 0 0" dur="2.6s" begin="0.4s" repeatCount="indefinite"/>
      <rect x="328" y="105" width="60" height="36" rx="8" fill="#0f172a" stroke="#c4b5fd" stroke-width="2.5"/>
      <text x="338" y="129" font-size="16" fill="#c4b5fd">&lt;/&gt;</text>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 3 -4; 0 0" dur="3.4s" begin="0.8s" repeatCount="indefinite"/>
      <rect x="8" y="160" width="52" height="28" rx="6" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
      <text x="16" y="180" font-size="13" fill="#e2e8f0">npm</text>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; -2 -5; 0 0" dur="2.9s" begin="0.2s" repeatCount="indefinite"/>
      <rect x="340" y="160" width="48" height="28" rx="6" fill="#1e293b" stroke="#7dd3fc" stroke-width="2"/>
      <text x="350" y="180" font-size="13" fill="#7dd3fc">git</text>
    </g>
  </g>

  <!-- coffee (big, clear) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -5; 0 0" dur="2.5s" repeatCount="indefinite"/>
    <rect x="28" y="230" width="44" height="38" rx="5" fill="#1e293b" stroke="#64748b" stroke-width="2.5"/>
    <path d="M72 240 Q90 248 72 260" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="50" cy="230" rx="22" ry="7" fill="#0f172a"/>
    <ellipse cx="50" cy="233" rx="16" ry="4" fill="#92400e"/>
    <path d="M40 220 Q36 208 42 202" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round">
      <animate attributeName="opacity" values="0.25;0.9;0.25" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M50 218 Q52 205 48 200" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round">
      <animate attributeName="opacity" values="0.2;0.85;0.2" dur="1.5s" begin="0.4s" repeatCount="indefinite"/>
    </path>
    <path d="M60 220 Q64 208 58 202" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round">
      <animate attributeName="opacity" values="0.15;0.8;0.15" dur="1.5s" begin="0.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- DUCK -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -7; 0 0" dur="2.8s" repeatCount="indefinite"/>

    <ellipse cx="195" cy="285" rx="105" ry="80" fill="url(#body)"/>
    <ellipse cx="220" cy="302" rx="52" ry="40" fill="#fef3c7" opacity="0.55"/>

    <ellipse cx="135" cy="280" rx="40" ry="30" fill="#fcd34d">
      <animateTransform attributeName="transform" type="rotate" values="-10 135 280; 12 135 280; -10 135 280" dur="1.2s" repeatCount="indefinite"/>
    </ellipse>

    <circle cx="245" cy="180" r="70" fill="url(#body)"/>
    <ellipse cx="225" cy="160" rx="26" ry="16" fill="#fef9c3" opacity="0.55"/>

    <path d="M205 150 Q240 133 275 153" fill="none" stroke="#0f172a" stroke-width="7" stroke-linecap="round"/>

    <circle cx="270" cy="180" r="17" fill="#fff"/>
    <circle cx="275" cy="180" r="9" fill="#0f172a"/>
    <circle cx="279" cy="176" r="3" fill="#fff"/>

    <circle cx="225" cy="200" r="12" fill="#fda4af" opacity="0.85"/>

    <path d="M310 190 L378 203 L310 225 Z" fill="url(#beak)"/>
    <ellipse cx="325" cy="203" rx="7" ry="5" fill="#9f1239" opacity="0.35"/>

    <!-- laptop -->
    <rect x="110" y="325" width="135" height="16" rx="3" fill="#1e293b"/>
    <rect x="130" y="258" width="110" height="70" rx="6" fill="#0f172a" stroke="#334155" stroke-width="3"/>
    <rect x="140" y="268" width="90" height="50" rx="3" fill="url(#screen)">
      <animate attributeName="opacity" values="0.75;1;0.75" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="152" y="300" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700" fill="#042f2e">&gt; ship_</text>

    <!-- snow cap -->
    <ellipse cx="240" cy="118" rx="24" ry="10" fill="#f8fafc"/>
    <circle cx="222" cy="116" r="7" fill="#ffffff"/>
    <circle cx="245" cy="112" r="8" fill="#ffffff"/>
    <circle cx="265" cy="118" r="6" fill="#ffffff"/>
    <ellipse cx="185" cy="258" rx="16" ry="6" fill="#f0f9ff"/>
    <ellipse cx="168" cy="325" rx="20" ry="5" fill="#f0f9ff"/>

    <!-- feet -->
    <ellipse cx="160" cy="358" rx="24" ry="11" fill="#f59e0b"/>
    <ellipse cx="225" cy="360" rx="22" ry="10" fill="#f59e0b"/>
  </g>

  <!-- BOTTOM: snow ground (big mounds) -->
  <ellipse cx="200" cy="420" rx="165" ry="32" fill="url(#snow)"/>
  <ellipse cx="95" cy="405" rx="48" ry="22" fill="#ffffff"/>
  <ellipse cx="200" cy="398" rx="58" ry="20" fill="#f8fafc"/>
  <ellipse cx="310" cy="408" rx="52" ry="24" fill="#ffffff"/>
  <ellipse cx="45" cy="430" rx="36" ry="16" fill="#e0f2fe"/>
  <ellipse cx="360" cy="432" rx="40" ry="17" fill="#e0f2fe"/>
  <ellipse cx="200" cy="390" rx="88" ry="14" fill="#0f172a" opacity="0.16">
    <animate attributeName="rx" values="88;78;88" dur="2.8s" repeatCount="indefinite"/>
  </ellipse>
  <!-- footprints -->
  <ellipse cx="70" cy="440" rx="8" ry="4" fill="#64748b" opacity="0.4" transform="rotate(-25 70 440)"/>
  <ellipse cx="92" cy="446" rx="8" ry="4" fill="#64748b" opacity="0.35" transform="rotate(-12 92 446)"/>
  <ellipse cx="112" cy="448" rx="7" ry="3.5" fill="#64748b" opacity="0.28"/>

  <!-- sticky note (large) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="3.2s" begin="0.6s" repeatCount="indefinite"/>
    <rect x="300" y="330" width="78" height="62" rx="4" fill="#facc15" transform="rotate(10 339 361)"/>
    <rect x="304" y="334" width="70" height="54" rx="3" fill="#fef08a" transform="rotate(10 339 361)"/>
    <text x="316" y="358" font-family="ui-monospace, Menlo, monospace" font-size="12" font-weight="700" fill="#713f12" transform="rotate(10 339 361)">TODO:</text>
    <text x="316" y="376" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700" fill="#854d0e" transform="rotate(10 339 361)">ship it</text>
  </g>

  <!-- falling snow (thicker flakes) -->
  <g>
    <circle cx="40" cy="0" r="3.5" fill="#e0f2fe">
      <animateTransform attributeName="transform" type="translate" values="0 0; 16 470" dur="5s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="5s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="-10" r="4.5" fill="#f0f9ff">
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 480" dur="5.8s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="5.8s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="-5" r="3" fill="#e0f2fe">
      <animateTransform attributeName="transform" type="translate" values="0 0; 20 475" dur="4.5s" begin="1.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="4.5s" begin="1.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="210" cy="-15" r="4" fill="#ffffff">
      <animateTransform attributeName="transform" type="translate" values="0 0; -8 485" dur="5.5s" begin="0.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="5.5s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="270" cy="0" r="3.5" fill="#e0f2fe">
      <animateTransform attributeName="transform" type="translate" values="0 0; 12 470" dur="4.8s" begin="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="4.8s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="-12" r="5" fill="#f0f9ff">
      <animateTransform attributeName="transform" type="translate" values="0 0; -14 480" dur="6s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="6s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="370" cy="-8" r="3" fill="#e0f2fe">
      <animateTransform attributeName="transform" type="translate" values="0 0; 8 475" dur="5.2s" begin="2.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="5.2s" begin="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="-20" r="2.5" fill="#bae6fd">
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 490" dur="6.5s" begin="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.08;0.88;1" dur="6.5s" begin="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="-25" r="3.5" fill="#ffffff">
      <animateTransform attributeName="transform" type="translate" values="0 0; -16 495" dur="4.9s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="4.9s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="-5" r="2.8" fill="#e0f2fe">
      <animateTransform attributeName="transform" type="translate" values="0 0; 6 480" dur="6.2s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.08;0.88;1" dur="6.2s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="-18" r="4" fill="#f0f9ff">
      <animateTransform attributeName="transform" type="translate" values="0 0; 14 488" dur="5.1s" begin="2.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="5.1s" begin="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="-22" r="3.2" fill="#ffffff">
      <animateTransform attributeName="transform" type="translate" values="0 0; -9 490" dur="4.3s" begin="0.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="4.3s" begin="0.1s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
