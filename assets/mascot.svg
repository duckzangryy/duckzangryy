<svg xmlns="http://www.w3.org/2000/svg" width="420" height="480" viewBox="0 0 420 480" role="img" aria-label="angry-cute duck mascot in snow">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="beak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <g id="flake">
      <circle r="2.2" fill="#e0f2fe"/>
      <circle r="3.6" fill="#bae6fd" opacity="0.35"/>
    </g>
  </defs>

  <rect width="420" height="480" fill="transparent"/>
  <circle cx="210" cy="220" r="170" fill="url(#glow)"/>

  <g filter="url(#soft)">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -10; 0 0" dur="2.8s" repeatCount="indefinite"/>

    <!-- shadow -->
    <ellipse cx="210" cy="400" rx="95" ry="16" fill="#0f172a" opacity="0.25">
      <animate attributeName="rx" values="95;85;95" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.15;0.25" dur="2.8s" repeatCount="indefinite"/>
    </ellipse>

    <!-- body -->
    <ellipse cx="200" cy="300" rx="110" ry="85" fill="url(#body)"/>
    <ellipse cx="225" cy="318" rx="55" ry="42" fill="#fef3c7" opacity="0.5"/>

    <!-- wing -->
    <ellipse cx="140" cy="295" rx="42" ry="32" fill="#fcd34d">
      <animateTransform attributeName="transform" type="rotate" values="-10 140 295; 14 140 295; -10 140 295" dur="1.2s" repeatCount="indefinite"/>
    </ellipse>

    <!-- head -->
    <circle cx="250" cy="195" r="72" fill="url(#body)"/>
    <ellipse cx="230" cy="175" rx="28" ry="18" fill="#fef9c3" opacity="0.55"/>

    <!-- angry brow -->
    <path d="M210 165 Q245 148 280 168" fill="none" stroke="#0f172a" stroke-width="7" stroke-linecap="round"/>

    <!-- eye -->
    <circle cx="275" cy="195" r="18" fill="#fff"/>
    <circle cx="280" cy="195" r="9" fill="#0f172a"/>
    <circle cx="284" cy="191" r="3" fill="#fff"/>

    <!-- cheek -->
    <circle cx="230" cy="215" r="12" fill="#fda4af" opacity="0.8"/>

    <!-- beak -->
    <path d="M315 205 L385 218 L315 240 Z" fill="url(#beak)"/>
    <ellipse cx="330" cy="218" rx="7" ry="5" fill="#9f1239" opacity="0.35"/>

    <!-- laptop -->
    <rect x="115" y="340" width="140" height="16" rx="3" fill="#1e293b"/>
    <rect x="135" y="275" width="115" height="72" rx="6" fill="#0f172a" stroke="#334155" stroke-width="3"/>
    <rect x="145" y="285" width="95" height="52" rx="3" fill="url(#screen)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="158" y="318" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700" fill="#042f2e">&gt; ship_</text>

    <!-- snow on head / laptop -->
    <ellipse cx="245" cy="132" rx="22" ry="8" fill="#f0f9ff" opacity="0.9"/>
    <circle cx="228" cy="130" r="6" fill="#f8fafc"/>
    <circle cx="250" cy="126" r="7" fill="#f8fafc"/>
    <circle cx="268" cy="132" r="5" fill="#f8fafc"/>
    <ellipse cx="190" cy="275" rx="14" ry="5" fill="#f0f9ff" opacity="0.75"/>
    <ellipse cx="175" cy="340" rx="18" ry="4" fill="#f0f9ff" opacity="0.7"/>
  </g>

  <!-- falling snow -->
  <g opacity="0.95">
    <use href="#flake" x="40" y="-10">
      <animateTransform attributeName="transform" type="translate" values="0 0; 18 500" dur="5.2s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="5.2s" begin="0s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="95" y="-20">
      <animateTransform attributeName="transform" type="translate" values="0 0; -12 510" dur="6.1s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="6.1s" begin="0.8s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="150" y="-15">
      <animateTransform attributeName="transform" type="translate" values="0 0; 22 505" dur="4.7s" begin="1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="4.7s" begin="1.4s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="210" y="-25">
      <animateTransform attributeName="transform" type="translate" values="0 0; -8 515" dur="5.8s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="5.8s" begin="0.3s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="270" y="-12">
      <animateTransform attributeName="transform" type="translate" values="0 0; 14 500" dur="4.9s" begin="1.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="4.9s" begin="1.9s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="320" y="-18">
      <animateTransform attributeName="transform" type="translate" values="0 0; -16 508" dur="6.4s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="6.4s" begin="0.5s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="370" y="-22">
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 512" dur="5.5s" begin="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="5.5s" begin="2.2s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="60" y="-8">
      <animateTransform attributeName="transform" type="translate" values="0 0; 8 490" dur="7s" begin="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.85;1" dur="7s" begin="2.8s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="180" y="-30">
      <animateTransform attributeName="transform" type="translate" values="0 0; -20 520" dur="5s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="5s" begin="1.1s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="300" y="-5">
      <animateTransform attributeName="transform" type="translate" values="0 0; 6 495" dur="6.8s" begin="3.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.1;0.85;1" dur="6.8s" begin="3.1s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="120" y="-28">
      <animateTransform attributeName="transform" type="translate" values="0 0; 16 518" dur="5.3s" begin="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="5.3s" begin="2.5s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="350" y="-14">
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 502" dur="4.4s" begin="0.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="4.4s" begin="0.2s" repeatCount="indefinite"/>
    </use>
    <!-- tiny flakes -->
    <circle cx="80" cy="0" r="1.4" fill="#e0f2fe">
      <animateTransform attributeName="transform" type="translate" values="0 0; 12 480" dur="6s" begin="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.1;0.85;1" dur="6s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="240" cy="0" r="1.6" fill="#f0f9ff">
      <animateTransform attributeName="transform" type="translate" values="0 0; -14 490" dur="5.6s" begin="3.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.85;1" dur="5.6s" begin="3.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="0" r="1.5" fill="#e0f2fe">
      <animateTransform attributeName="transform" type="translate" values="0 0; -6 485" dur="7.2s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.75;0.75;0" keyTimes="0;0.1;0.85;1" dur="7.2s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
