<svg xmlns="http://www.w3.org/2000/svg" width="420" height="480" viewBox="0 0 420 480" role="img" aria-label="angry-cute duck mascot in snow">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="beak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#bae6fd" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <g id="flake">
      <circle r="2.2" fill="#e0f2fe"/>
      <circle r="3.6" fill="#bae6fd" opacity="0.35"/>
    </g>
    <g id="star">
      <path d="M0-5 L1.4-1.4 L5 0 L1.4 1.4 L0 5 L-1.4 1.4 L-5 0 L-1.4-1.4 Z" fill="#fef08a"/>
    </g>
  </defs>

  <rect width="420" height="480" fill="transparent"/>
  <circle cx="210" cy="230" r="175" fill="url(#glow)"/>

  <!-- top: stars + floating code chips -->
  <g opacity="0.9">
    <use href="#star" x="70" y="48">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="2.4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="1;1.25;1" dur="2.4s" repeatCount="indefinite" additive="sum"/>
    </use>
    <use href="#star" x="340" y="42">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="0.6s" repeatCount="indefinite"/>
    </use>
    <use href="#star" x="200" y="28">
      <animate attributeName="opacity" values="0.3;0.95;0.3" dur="2.1s" begin="1.1s" repeatCount="indefinite"/>
    </use>
    <use href="#star" x="120" y="72" opacity="0.55"/>
    <use href="#star" x="300" y="68" opacity="0.45"/>
    <circle cx="50" cy="90" r="1.5" fill="#a5f3fc">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="380" cy="95" r="1.8" fill="#fde68a">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- floating { } chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="700" fill="#67e8f9">
    <text x="42" y="130" font-size="22" opacity="0.55">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.7;0.35" dur="3.2s" repeatCount="indefinite"/>{}
    </text>
    <text x="355" y="145" font-size="18" fill="#a78bfa" opacity="0.5">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -6; 0 0" dur="2.7s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.65;0.3" dur="2.7s" begin="0.5s" repeatCount="indefinite"/>&lt;/&gt;
    </text>
    <text x="28" y="200" font-size="14" fill="#94a3b8" opacity="0.45">
      <animateTransform attributeName="transform" type="translate" values="0 0; 4 -5; 0 0" dur="3.5s" begin="1s" repeatCount="indefinite"/>npm
    </text>
    <text x="360" y="210" font-size="13" fill="#7dd3fc" opacity="0.4">
      <animateTransform attributeName="transform" type="translate" values="0 0; -3 -7; 0 0" dur="3s" begin="0.3s" repeatCount="indefinite"/>git
    </text>
  </g>

  <!-- coffee mug top-left of duck -->
  <g transform="translate(48,155)">
    <animateTransform attributeName="transform" type="translate" values="48 155; 48 148; 48 155" dur="2.6s" repeatCount="indefinite"/>
    <rect x="0" y="18" width="34" height="28" rx="4" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <path d="M34 24 Q46 28 34 38" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="17" cy="18" rx="17" ry="5" fill="#0f172a"/>
    <ellipse cx="17" cy="20" rx="12" ry="3" fill="#78350f"/>
    <!-- steam -->
    <path d="M10 12 Q8 4 12 0" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" opacity="0.6">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.6s" repeatCount="indefinite"/>
    </path>
    <path d="M18 10 Q20 2 16 -2" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" opacity="0.5">
      <animate attributeName="opacity" values="0.15;0.65;0.15" dur="1.6s" begin="0.4s" repeatCount="indefinite"/>
    </path>
    <path d="M26 12 Q28 5 24 1" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" opacity="0.45">
      <animate attributeName="opacity" values="0.1;0.55;0.1" dur="1.6s" begin="0.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <g filter="url(#soft)">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" dur="2.8s" repeatCount="indefinite"/>

    <!-- body -->
    <ellipse cx="200" cy="290" rx="110" ry="85" fill="url(#body)"/>
    <ellipse cx="225" cy="308" rx="55" ry="42" fill="#fef3c7" opacity="0.5"/>

    <!-- wing -->
    <ellipse cx="140" cy="285" rx="42" ry="32" fill="#fcd34d">
      <animateTransform attributeName="transform" type="rotate" values="-10 140 285; 14 140 285; -10 140 285" dur="1.2s" repeatCount="indefinite"/>
    </ellipse>

    <!-- head -->
    <circle cx="250" cy="185" r="72" fill="url(#body)"/>
    <ellipse cx="230" cy="165" rx="28" ry="18" fill="#fef9c3" opacity="0.55"/>

    <!-- angry brow -->
    <path d="M210 155 Q245 138 280 158" fill="none" stroke="#0f172a" stroke-width="7" stroke-linecap="round"/>

    <!-- eye -->
    <circle cx="275" cy="185" r="18" fill="#fff"/>
    <circle cx="280" cy="185" r="9" fill="#0f172a"/>
    <circle cx="284" cy="181" r="3" fill="#fff"/>

    <!-- cheek -->
    <circle cx="230" cy="205" r="12" fill="#fda4af" opacity="0.8"/>

    <!-- beak -->
    <path d="M315 195 L385 208 L315 230 Z" fill="url(#beak)"/>
    <ellipse cx="330" cy="208" rx="7" ry="5" fill="#9f1239" opacity="0.35"/>

    <!-- laptop -->
    <rect x="115" y="330" width="140" height="16" rx="3" fill="#1e293b"/>
    <rect x="135" y="265" width="115" height="72" rx="6" fill="#0f172a" stroke="#334155" stroke-width="3"/>
    <rect x="145" y="275" width="95" height="52" rx="3" fill="url(#screen)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="158" y="308" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700" fill="#042f2e">&gt; ship_</text>

    <!-- snow on head / laptop -->
    <ellipse cx="245" cy="122" rx="22" ry="8" fill="#f0f9ff" opacity="0.9"/>
    <circle cx="228" cy="120" r="6" fill="#f8fafc"/>
    <circle cx="250" cy="116" r="7" fill="#f8fafc"/>
    <circle cx="268" cy="122" r="5" fill="#f8fafc"/>
    <ellipse cx="190" cy="265" rx="14" ry="5" fill="#f0f9ff" opacity="0.75"/>
    <ellipse cx="175" cy="330" rx="18" ry="4" fill="#f0f9ff" opacity="0.7"/>

    <!-- tiny feet -->
    <ellipse cx="165" cy="365" rx="22" ry="10" fill="#f59e0b"/>
    <ellipse cx="230" cy="368" rx="20" ry="9" fill="#f59e0b"/>
  </g>

  <!-- bottom: snow ground -->
  <g>
    <ellipse cx="210" cy="430" rx="155" ry="28" fill="url(#ground)"/>
    <ellipse cx="120" cy="418" rx="36" ry="16" fill="#f8fafc" opacity="0.85"/>
    <ellipse cx="300" cy="420" rx="42" ry="18" fill="#f0f9ff" opacity="0.8"/>
    <ellipse cx="210" cy="412" rx="50" ry="14" fill="#ffffff" opacity="0.7"/>
    <ellipse cx="70" cy="435" rx="28" ry="12" fill="#e0f2fe" opacity="0.65"/>
    <ellipse cx="355" cy="438" rx="32" ry="13" fill="#e0f2fe" opacity="0.6"/>
    <!-- soft shadow under duck -->
    <ellipse cx="210" cy="400" rx="90" ry="12" fill="#0f172a" opacity="0.18">
      <animate attributeName="rx" values="90;80;90" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.18;0.1;0.18" dur="2.8s" repeatCount="indefinite"/>
    </ellipse>
    <!-- tiny footprints -->
    <ellipse cx="95" cy="445" rx="6" ry="3" fill="#94a3b8" opacity="0.35" transform="rotate(-20 95 445)"/>
    <ellipse cx="112" cy="450" rx="6" ry="3" fill="#94a3b8" opacity="0.3" transform="rotate(-10 112 450)"/>
    <ellipse cx="128" cy="452" rx="5" ry="2.5" fill="#94a3b8" opacity="0.25"/>
  </g>

  <!-- sticky note bottom-right -->
  <g transform="translate(320,360)">
    <animateTransform attributeName="transform" type="translate" values="320 360; 320 354; 320 360" dur="3.4s" begin="0.7s" repeatCount="indefinite"/>
    <rect x="0" y="0" width="58" height="48" rx="3" fill="#fef08a" transform="rotate(8 29 24)"/>
    <rect x="2" y="2" width="54" height="44" rx="2" fill="#fef9c3" transform="rotate(8 29 24)"/>
    <text x="10" y="22" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="#854d0e" transform="rotate(8 29 24)">TODO:</text>
    <text x="10" y="34" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="#a16207" transform="rotate(8 29 24)">ship it</text>
  </g>

  <!-- falling snow -->
  <g opacity="0.95">
    <use href="#flake" x="40" y="-10">
      <animateTransform attributeName="transform" type="translate" values="0 0; 18 500" dur="5.2s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="5.2s" begin="0s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="95" y="-20">
      <animateTransform attributeName="transform" type="translate" values="0 0; -12 510" dur="6.1s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="6.1s" begin="0.8s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="150" y="-15">
      <animateTransform attributeName="transform" type="translate" values="0 0; 22 505" dur="4.7s" begin="1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="4.7s" begin="1.4s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="210" y="-25">
      <animateTransform attributeName="transform" type="translate" values="0 0; -8 515" dur="5.8s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="5.8s" begin="0.3s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="270" y="-12">
      <animateTransform attributeName="transform" type="translate" values="0 0; 14 500" dur="4.9s" begin="1.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="4.9s" begin="1.9s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="320" y="-18">
      <animateTransform attributeName="transform" type="translate" values="0 0; -16 508" dur="6.4s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="6.4s" begin="0.5s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="370" y="-22">
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 512" dur="5.5s" begin="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="5.5s" begin="2.2s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="60" y="-8">
      <animateTransform attributeName="transform" type="translate" values="0 0; 8 490" dur="7s" begin="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.85;1" dur="7s" begin="2.8s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="180" y="-30">
      <animateTransform attributeName="transform" type="translate" values="0 0; -20 520" dur="5s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="5s" begin="1.1s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="300" y="-5">
      <animateTransform attributeName="transform" type="translate" values="0 0; 6 495" dur="6.8s" begin="3.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.1;0.85;1" dur="6.8s" begin="3.1s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="120" y="-28">
      <animateTransform attributeName="transform" type="translate" values="0 0; 16 518" dur="5.3s" begin="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="5.3s" begin="2.5s" repeatCount="indefinite"/>
    </use>
    <use href="#flake" x="350" y="-14">
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 502" dur="4.4s" begin="0.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="4.4s" begin="0.2s" repeatCount="indefinite"/>
    </use>
    <circle cx="80" cy="0" r="1.4" fill="#e0f2fe">
      <animateTransform attributeName="transform" type="translate" values="0 0; 12 480" dur="6s" begin="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.1;0.85;1" dur="6s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="240" cy="0" r="1.6" fill="#f0f9ff">
      <animateTransform attributeName="transform" type="translate" values="0 0; -14 490" dur="5.6s" begin="3.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.85;1" dur="5.6s" begin="3.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="0" r="1.5" fill="#e0f2fe">
      <animateTransform attributeName="transform" type="translate" values="0 0; -6 485" dur="7.2s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.75;0.75;0" keyTimes="0;0.1;0.85;1" dur="7.2s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
