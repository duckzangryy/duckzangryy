    <rect x="15" y="20" width="1.6" height="6" rx="0.6" fill="#fff" opacity="0.9"/>
    <rect x="17.6" y="17.5" width="1.6" height="8.5" rx="0.6" fill="#fff"/>
    <rect x="20.2" y="15.5" width="1.6" height="10.5" rx="0.6" fill="#fff"/>
    <rect x="22.8" y="16.5" width="1.6" height="9.5" rx="0.6" fill="#fff"/>
    <rect x="25.4" y="18" width="1.6" height="8" rx="0.6" fill="#fff"/>
    <rect x="28" y="19.5" width="1.6" height="6.5" rx="0.6" fill="#fff" opacity="0.9"/>
    <!-- cloud bump -->
    <path d="M29.5 22.5c0-1.6 1.2-2.9 2.7-2.9.3-1.2 1.4-2.1 2.7-2.1 1.5 0 2.8 1.2 2.8 2.8v4.2h-8.2v-2z" fill="#fff"/>
