<svg xmlns="http://www.w3.org/2000/svg" width="166" height="44" viewBox="0 0 166 44" role="img" aria-label="SoundCloud">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF5500" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.2" flood-color="#FF5500" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect x="1" y="1" width="164" height="42" rx="12" fill="url(#bg)" stroke="url(#edge)" stroke-width="1.5"/>
  <rect x="1" y="1" width="164" height="20" rx="12" fill="#fff" opacity="0.03"/>
