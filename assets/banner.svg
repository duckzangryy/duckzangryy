<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="duckzangryy banner">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1026">
        <animate attributeName="stop-color" values="#0b1026;#12183a;#0b1026" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="55%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0f766e">
        <animate attributeName="stop-color" values="#0f766e;#0891b2;#0f766e" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="pond" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e7490" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#134e4a" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="duckBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="frame">
      <rect width="1200" height="320" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="320" fill="url(#sky)"/>

    <!-- stars -->
    <g fill="#e2e8f0" opacity="0.85">
      <circle cx="80" cy="40" r="1.5">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="180" cy="70" r="1.2">
        <animate attributeName="opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="320" cy="28" r="1.4">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="3.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="980" cy="50" r="1.5">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1100" cy="90" r="1.1">
        <animate attributeName="opacity" values="1;0.3;1" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="860" cy="30" r="1.3">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2.1s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- floating code glyphs -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14" fill="#67e8f9" opacity="0.35">
      <text x="90" y="120">{ }</text>
      <text x="200" y="160">&lt;/&gt;</text>
      <text x="1050" y="140">fn()</text>
      <text x="980" y="190">=&gt;</text>
      <text x="140" y="200">#</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" dur="5s" repeatCount="indefinite"/>
    </g>

    <!-- pond -->
    <ellipse cx="600" cy="300" rx="620" ry="70" fill="url(#pond)"/>
    <path d="M0 250 Q150 235 300 250 T600 250 T900 250 T1200 250 V320 H0 Z" fill="#0f766e" opacity="0.55">
      <animate attributeName="d"
        values="M0 250 Q150 235 300 250 T600 250 T900 250 T1200 250 V320 H0 Z;
                M0 250 Q150 265 300 250 T600 250 T900 250 T1200 250 V320 H0 Z;
                M0 250 Q150 235 300 250 T600 250 T900 250 T1200 250 V320 H0 Z"
        dur="4s" repeatCount="indefinite"/>
    </path>

    <!-- ripples -->
    <g fill="none" stroke="#99f6e4" stroke-width="2" opacity="0.45">
      <ellipse cx="720" cy="265" rx="30" ry="8">
        <animate attributeName="rx" values="20;55;20" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="720" cy="265" rx="18" ry="5">
        <animate attributeName="rx" values="10;40;10" dur="3s" begin="0.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" begin="0.6s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- duck group -->
    <g filter="url(#softGlow)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -6; 0 0" dur="2.4s" repeatCount="indefinite"/>

      <!-- body -->
      <ellipse cx="700" cy="210" rx="58" ry="42" fill="url(#duckBody)"/>
      <!-- wing -->
      <ellipse cx="670" cy="210" rx="22" ry="16" fill="#fcd34d">
        <animateTransform attributeName="transform" type="rotate" values="-6 670 210; 10 670 210; -6 670 210" dur="1.2s" repeatCount="indefinite"/>
      </ellipse>
      <!-- head -->
      <circle cx="755" cy="175" r="30" fill="#fbbf24"/>
      <!-- eye white -->
      <circle cx="765" cy="168" r="8" fill="#fff"/>
      <!-- pupil (angry-cute) -->
      <circle cx="767" cy="168" r="4" fill="#0f172a"/>
      <!-- brow -->
      <path d="M752 158 Q765 152 778 160" fill="none" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
      <!-- beak -->
      <path d="M782 178 L812 185 L782 194 Z" fill="#fb7185"/>
      <!-- cheek -->
      <circle cx="748" cy="182" r="5" fill="#fda4af" opacity="0.7"/>
      <!-- laptop -->
      <rect x="640" y="225" width="70" height="42" rx="4" fill="#1e293b"/>
      <rect x="646" y="230" width="58" height="28" rx="2" fill="#0ea5e9" opacity="0.85">
        <animate attributeName="opacity" values="0.55;0.95;0.55" dur="1.8s" repeatCount="indefinite"/>
      </rect>
      <text x="655" y="248" font-family="ui-monospace, monospace" font-size="10" fill="#ecfeff">&gt;_ ship</text>
    </g>

    <!-- title -->
    <g font-family="'Segoe UI', system-ui, sans-serif">
      <text x="72" y="120" font-size="42" font-weight="800" fill="#f8fafc" letter-spacing="1">
        duckzangryy
      </text>
      <text x="74" y="158" font-size="18" font-weight="500" fill="#99f6e4">
        code · craft · slightly unhinged duck energy
      </text>
      <rect x="72" y="180" width="220" height="36" rx="18" fill="url(#glow)" opacity="0.25"/>
      <text x="92" y="204" font-size="14" font-weight="600" fill="#e0f2fe">
        builder · tinkerer · night owl
      </text>
    </g>

    <!-- status chip -->
    <g>
      <rect x="72" y="240" width="168" height="28" rx="14" fill="#042f2e" stroke="#2dd4bf" stroke-width="1.5"/>
      <circle cx="92" cy="254" r="5" fill="#34d399">
        <animate attributeName="opacity" values="1;0.25;1" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      <text x="106" y="258" font-family="ui-monospace, monospace" font-size="12" fill="#a7f3d0">online · shipping</text>
    </g>
  </g>

  <!-- border -->
  <rect x="1" y="1" width="1198" height="318" rx="28" fill="none" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="2"/>
</svg>
