<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-label="duckzangryy — cyber pond banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="45%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#062a2e"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="35%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#a78bfa" stop-opacity="0.28"/>
      <stop offset="75%" stop-color="#fbbf24" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pond" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e7490" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#042f2e" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="duck" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="beak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#22d3ee" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <clipPath id="frame"><rect width="1400" height="420" rx="32"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1400" height="420" fill="url(#bg)"/>
    <rect width="1400" height="420" fill="url(#grid)"/>

    <!-- aurora band -->
    <ellipse cx="700" cy="90" rx="520" ry="70" fill="url(#aurora)">
      <animate attributeName="opacity" values="0.55;0.9;0.55" dur="7s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="-30 0; 30 0; -30 0" dur="12s" repeatCount="indefinite"/>
    </ellipse>

    <!-- orbs -->
    <circle cx="180" cy="120" r="90" fill="url(#orb)"/>
    <circle cx="1180" cy="160" r="120" fill="url(#orb)" opacity="0.7"/>

    <!-- stars -->
    <g fill="#e2e8f0">
      <circle cx="70" cy="48" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite"/></circle>
      <circle cx="160" cy="86" r="1.1"><animate attributeName="opacity" values="1;0.25;1" dur="3.2s" repeatCount="indefinite"/></circle>
      <circle cx="290" cy="36" r="1.6"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/></circle>
      <circle cx="980" cy="54" r="1.3"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.6s" repeatCount="indefinite"/></circle>
      <circle cx="1100" cy="98" r="1.2"><animate attributeName="opacity" values="1;0.2;1" dur="2.1s" repeatCount="indefinite"/></circle>
      <circle cx="1260" cy="40" r="1.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.9s" repeatCount="indefinite"/></circle>
      <circle cx="420" cy="70" r="1"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4s" repeatCount="indefinite"/></circle>
    </g>

    <!-- floating code particles -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#67e8f9" opacity="0.28">
      <text x="95" y="150">{ }</text>
      <text x="220" y="200">&lt;/&gt;</text>
      <text x="1240" y="170">fn()</text>
      <text x="1120" y="230">=&gt;</text>
      <text x="130" y="250">#</text>
      <text x="1050" y="130">async</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -10; 0 0" dur="6s" repeatCount="indefinite"/>
    </g>

    <!-- left HUD panel -->
    <g filter="url(#soft)">
      <rect x="56" y="58" width="520" height="250" rx="22" fill="#07111f" fill-opacity="0.72" stroke="#22d3ee" stroke-opacity="0.22" stroke-width="1.5"/>
      <rect x="56" y="58" width="520" height="42" rx="22" fill="#0b1c2e" fill-opacity="0.9"/>
      <rect x="56" y="80" width="520" height="20" fill="#0b1c2e"/>
      <!-- traffic lights -->
      <circle cx="84" cy="79" r="6" fill="#fb7185"/>
      <circle cx="106" cy="79" r="6" fill="#fbbf24"/>
      <circle cx="128" cy="79" r="6" fill="#34d399"/>
      <text x="156" y="84" font-family="ui-monospace, monospace" font-size="12" fill="#64748b">~/pond/profile.sh</text>

      <!-- title -->
      <text x="84" y="148" font-family="'Segoe UI', system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#titleGrad)" letter-spacing="1.5">duckzangryy</text>
      <text x="86" y="184" font-family="ui-monospace, monospace" font-size="15" fill="#99f6e4">// engineer · builder · slightly unhinged duck</text>

      <!-- chips -->
      <g font-family="ui-monospace, monospace" font-size="12">
        <rect x="84" y="210" width="118" height="28" rx="14" fill="#042f2e" stroke="#2dd4bf" stroke-width="1"/>
        <circle cx="102" cy="224" r="4" fill="#34d399"><animate attributeName="opacity" values="1;0.2;1" dur="1.3s" repeatCount="indefinite"/></circle>
        <text x="114" y="228" fill="#a7f3d0">ONLINE</text>

        <rect x="214" y="210" width="130" height="28" rx="14" fill="#1e1b4b" stroke="#818cf8" stroke-width="1"/>
        <text x="232" y="228" fill="#c7d2fe">GMT+7 · VN</text>

        <rect x="356" y="210" width="160" height="28" rx="14" fill="#422006" stroke="#fbbf24" stroke-width="1"/>
        <text x="374" y="228" fill="#fde68a">SHIP MODE ON</text>
      </g>

      <text x="86" y="270" font-family="ui-monospace, monospace" font-size="13" fill="#64748b">$ craft · automate · ship · repeat_</text>
      <rect x="468" y="258" width="8" height="16" fill="#22d3ee">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- pond -->
    <path d="M0 330 Q200 300 400 320 T800 315 T1200 325 T1400 310 V420 H0 Z" fill="url(#pond)">
      <animate attributeName="d"
        values="M0 330 Q200 300 400 320 T800 315 T1200 325 T1400 310 V420 H0 Z;
                M0 330 Q200 340 400 320 T800 330 T1200 315 T1400 325 V420 H0 Z;
                M0 330 Q200 300 400 320 T800 315 T1200 325 T1400 310 V420 H0 Z"
        dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M0 350 Q250 335 500 348 T1000 345 T1400 355 V420 H0 Z" fill="#0f766e" opacity="0.35"/>

    <!-- ripples -->
    <g fill="none" stroke="#99f6e4" stroke-width="1.5" opacity="0.4">
      <ellipse cx="980" cy="340" rx="28" ry="7">
        <animate attributeName="rx" values="18;60;18" dur="3.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.55;0;0.55" dur="3.2s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="980" cy="340" rx="14" ry="4">
        <animate attributeName="rx" values="8;42;8" dur="3.2s" begin="0.7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.45;0;0.45" dur="3.2s" begin="0.7s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- duck character -->
    <g filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" dur="2.6s" repeatCount="indefinite"/>

      <!-- shadow on water -->
      <ellipse cx="980" cy="348" rx="70" ry="10" fill="#022c22" opacity="0.45"/>

      <!-- body -->
      <ellipse cx="960" cy="280" rx="72" ry="52" fill="url(#duck)"/>
      <!-- belly highlight -->
      <ellipse cx="975" cy="292" rx="36" ry="28" fill="#fef3c7" opacity="0.45"/>

      <!-- wing -->
      <ellipse cx="920" cy="278" rx="28" ry="20" fill="#fcd34d">
        <animateTransform attributeName="transform" type="rotate" values="-8 920 278; 12 920 278; -8 920 278" dur="1.1s" repeatCount="indefinite"/>
      </ellipse>

      <!-- head -->
      <circle cx="1030" cy="235" r="38" fill="url(#duck)"/>
      <!-- head highlight -->
      <ellipse cx="1020" cy="222" rx="14" ry="10" fill="#fef9c3" opacity="0.5"/>

      <!-- angry brow -->
      <path d="M1008 218 Q1028 208 1048 220" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
      <!-- eye -->
      <circle cx="1042" cy="232" r="10" fill="#fff"/>
      <circle cx="1045" cy="232" r="5" fill="#0f172a"/>
      <circle cx="1047" cy="230" r="1.6" fill="#fff"/>
      <!-- cheek -->
      <circle cx="1018" cy="246" r="6" fill="#fda4af" opacity="0.75"/>
      <!-- beak -->
      <path d="M1065 240 L1108 248 L1065 260 Z" fill="url(#beak)"/>
      <ellipse cx="1072" cy="248" rx="4" ry="3" fill="#9f1239" opacity="0.35"/>

      <!-- laptop -->
      <g>
        <rect x="885" y="300" width="95" height="12" rx="2" fill="#1e293b"/>
        <rect x="900" y="255" width="78" height="50" rx="4" fill="#0f172a" stroke="#334155" stroke-width="2"/>
        <rect x="907" y="262" width="64" height="36" rx="2" fill="url(#screen)">
          <animate attributeName="opacity" values="0.65;1;0.65" dur="2s" repeatCount="indefinite"/>
        </rect>
        <text x="916" y="284" font-family="ui-monospace, monospace" font-size="11" fill="#042f2e" font-weight="700">&gt; ship_</text>
      </g>
    </g>

    <!-- right mini metrics -->
    <g font-family="ui-monospace, monospace" font-size="11" fill="#94a3b8">
      <rect x="1180" y="70" width="170" height="100" rx="14" fill="#07111f" fill-opacity="0.65" stroke="#a78bfa" stroke-opacity="0.25"/>
      <text x="1200" y="98" fill="#c4b5fd">SYSTEM</text>
      <text x="1200" y="122" fill="#e2e8f0">focus ..... 98%</text>
      <text x="1200" y="142" fill="#e2e8f0">caffeine .. max</text>
      <text x="1200" y="162" fill="#e2e8f0">bugs ...... 0*</text>
    </g>
  </g>

  <!-- outer border -->
  <rect x="1.5" y="1.5" width="1397" height="417" rx="32" fill="none" stroke="url(#aurora)" stroke-width="2.5" stroke-opacity="0.85"/>
</svg>
