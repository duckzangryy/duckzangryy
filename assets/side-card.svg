<svg xmlns="http://www.w3.org/2000/svg" width="360" height="420" viewBox="0 0 360 420" role="img" aria-label="night terminal card">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="scr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
    <linearGradient id="mug" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- soft glow -->
  <circle cx="180" cy="200" r="150" fill="#22d3ee" opacity="0.08"/>

  <!-- terminal window -->
  <rect x="40" y="48" width="280" height="200" rx="16" fill="url(#panel)" stroke="#334155" stroke-width="3"/>
  <rect x="40" y="48" width="280" height="36" rx="16" fill="#0f172a"/>
  <rect x="40" y="68" width="280" height="16" fill="#0f172a"/>
  <circle cx="66" cy="66" r="6" fill="#f87171"/>
  <circle cx="88" cy="66" r="6" fill="#fbbf24"/>
  <circle cx="110" cy="66" r="6" fill="#34d399"/>
  <text x="140" y="71" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#64748b">ship.sh</text>

  <!-- terminal body -->
  <rect x="56" y="96" width="248" height="134" rx="8" fill="#020617"/>
  <text x="70" y="124" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#34d399">$ npm run ship</text>
  <text x="70" y="148" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#67e8f9">→ building…</text>
  <text x="70" y="172" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#a78bfa">→ tests green</text>
  <text x="70" y="196" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#fbbf24">→ deploy ok</text>
  <text x="70" y="220" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#e2e8f0">&gt;_</text>
  <rect x="88" y="208" width="10" height="16" fill="#67e8f9">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- coffee -->
  <g transform="translate(70,280)">
    <rect x="0" y="20" width="56" height="48" rx="6" fill="url(#mug)" stroke="#64748b" stroke-width="2.5"/>
    <path d="M56 32 Q76 42 56 56" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="28" cy="20" rx="28" ry="8" fill="#020617"/>
    <ellipse cx="28" cy="24" rx="20" ry="5" fill="#78350f"/>
    <path d="M16 12 Q12 -2 18 -8" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round">
      <animate attributeName="opacity" values="0.25;0.9;0.25" dur="1.6s" repeatCount="indefinite"/>
    </path>
    <path d="M28 10 Q30 -4 26 -10" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round">
      <animate attributeName="opacity" values="0.2;0.85;0.2" dur="1.6s" begin="0.4s" repeatCount="indefinite"/>
    </path>
    <path d="M40 12 Q44 0 38 -6" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round">
      <animate attributeName="opacity" values="0.15;0.8;0.15" dur="1.6s" begin="0.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- sticky note -->
  <g transform="translate(200,275) rotate(8)">
    <rect width="100" height="80" rx="4" fill="#facc15"/>
    <rect x="4" y="4" width="92" height="72" rx="3" fill="#fef08a"/>
    <text x="14" y="28" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700" fill="#713f12">03:00</text>
    <text x="14" y="48" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#854d0e">ship it</text>
    <text x="14" y="66" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#a16207">or sleep</text>
  </g>

  <!-- floating chips -->
  <g font-family="ui-monospace, Menlo, monospace" font-weight="700">
    <rect x="24" y="20" width="44" height="22" rx="6" fill="#0f172a" stroke="#67e8f9" stroke-width="2"/>
    <text x="32" y="36" font-size="12" fill="#67e8f9">DX</text>
    <rect x="280" y="28" width="52" height="22" rx="6" fill="#0f172a" stroke="#c4b5fd" stroke-width="2"/>
    <text x="290" y="44" font-size="11" fill="#c4b5fd">git</text>
  </g>
</svg>
